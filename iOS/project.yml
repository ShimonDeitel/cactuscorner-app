name: CactusCorner
options:
  bundleIdPrefix: com.shimondeitel.cactuscorner
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CactusCorner:
    type: application
    platform: iOS
    sources:
      - path: CactusCorner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cactuscorner
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CactusCorner/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CactusCornerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CactusCornerTests
      - path: CactusCorner.storekit
    dependencies:
      - target: CactusCorner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cactuscorner.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CactusCornerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CactusCornerUITests
    dependencies:
      - target: CactusCorner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cactuscorner.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CactusCorner:
    build:
      targets:
        CactusCorner: all
        CactusCornerTests: [test]
        CactusCornerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CactusCorner.storekit
    test:
      config: Debug
      storeKitConfiguration: CactusCorner.storekit
      targets:
        - CactusCornerTests
        - CactusCornerUITests
    archive:
      config: Release
